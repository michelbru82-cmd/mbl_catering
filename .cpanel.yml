---
# cPanel Git Version Control deployment.
# When you click "Deploy HEAD Commit" in cPanel (after "Update from Remote"),
# cPanel runs these tasks as your user and copies the web files into the
# live folder that serves https://fbws.tw/mbl_catering/
#
# ADJUST the path on the first line ONLY if fbws.tw's document root is not the
# standard public_html (e.g. an addon domain might be $HOME/fbws.tw/). Everything
# else stays the same.
deployment:
  tasks:
    - export DEPLOYPATH=$HOME/public_html/mbl_catering
    - /bin/mkdir -p $DEPLOYPATH/assets
    - /bin/cp -R index.html $DEPLOYPATH/
    - /bin/cp -R .htaccess $DEPLOYPATH/
    - /bin/cp -R assets/. $DEPLOYPATH/assets/
    # MBL CRM — deployed to https://fbws.tw/mbl_crm/
    - export CRMPATH=$HOME/public_html/mbl_crm
    - /bin/mkdir -p $CRMPATH/assets
    - /bin/cp -R mbl_crm/index.html $CRMPATH/
    - /bin/cp -R mbl_crm/.htaccess $CRMPATH/
    - /bin/cp -R mbl_crm/assets/. $CRMPATH/assets/
