name: Deploy to fbws.tw (SFTP)

# Auto-deploys both web apps to Gandi Simple Hosting over SFTP (port 22, password/
# token auth) on every push to the deploy branch (or via "Run workflow"). Runs on
# GitHub's runners, which can reach Gandi — so no manual uploads.
#   • Catering app -> htdocs/mbl_catering  (https://fbws.tw/mbl_catering)
#   • CRM app      -> htdocs/mbl_crm        (https://fbws.tw/mbl_crm)
#
# One-time setup — GitHub → Settings → Secrets and variables → Actions → New secret:
#   FTP_SERVER      sftp.sd3.gpaas.net
#   FTP_USERNAME    your Gandi hosting user (the UUID)
#   FTP_PASSWORD    a Gandi personal access token
#                   (Gandi admin → Web Hosting → your hosting → "Create a token")
#   FTP_SERVER_DIR  web folder — default /htdocs/mbl_catering  (fbws.tw is primary → /htdocs is root)
# Optional:
#   FTP_PORT        default 22
#
# Until FTP_SERVER is set the deploy step is skipped (run stays green).

on:
  push:
    branches: [ main, claude/catering-management-app-7ucf65 ]
  workflow_dispatch: {}

concurrency:
  group: deploy-fbws
  cancel-in-progress: true

jobs:
  sftp-deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage web files (only what the site serves)
        run: |
          # Catering app -> dist/  (uploaded to htdocs/mbl_catering)
          mkdir -p dist
          cp index.html .htaccess dist/
          cp -r assets dist/
          echo "Staged catering files:" && find dist -type f | wc -l
          # CRM app -> dist_crm/  (uploaded to htdocs/mbl_crm)
          mkdir -p dist_crm
          cp mbl_crm/index.html mbl_crm/.htaccess dist_crm/
          cp -r mbl_crm/assets dist_crm/
          echo "Staged CRM files:" && find dist_crm -type f | wc -l

      - name: Install lftp
        if: ${{ env.FTP_SERVER != '' }}
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP
        if: ${{ env.FTP_SERVER != '' }}
        env:
          HOST: ${{ secrets.FTP_SERVER }}
          USER: ${{ secrets.FTP_USERNAME }}
          PASS: ${{ secrets.FTP_PASSWORD }}
          PORT: ${{ secrets.FTP_PORT != '' && secrets.FTP_PORT || '22' }}
          # Gandi serves fbws.tw from the htdocs docroot; each app lives in its own subfolder.
          # Hardcoded (the FTP_SERVER_DIR secret was missing the /htdocs/ segment and is ignored).
          DIR:     /lamp0/web/vhosts/fbws.tw/htdocs/mbl_catering
          CRM_DIR: /lamp0/web/vhosts/fbws.tw/htdocs/mbl_crm
        run: |
          echo "==> Deploying to '$DIR' on $HOST:$PORT"
          # 1) Diagnostics + ensure target dir exists (never fails the job)
          lftp <<EOF || echo "(mkdir/diagnostic step returned non-zero — continuing)"
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 25
          open sftp://$HOST:$PORT
          user "$USER" "$PASS"
          echo "--- remote pwd (where SFTP lands) ---"
          pwd
          echo "--- listing of SFTP root '/' ---"
          cls -l /
          echo "--- /vhosts/fbws.tw/ (web root candidates) ---"
          cls -l /vhosts/fbws.tw/
          echo "--- /vhosts/fbws.tw/htdocs/ (if it exists) ---"
          cls -l /vhosts/fbws.tw/htdocs/
          echo "--- recursive tree under /vhosts/fbws.tw/ (find every index.html copy) ---"
          find /vhosts/fbws.tw/
          echo "--- attempting mkdir target ($DIR) ---"
          mkdir -p "$DIR"
          echo "--- attempting mkdir CRM target ($CRM_DIR) ---"
          mkdir -p "$CRM_DIR"
          bye
          EOF
          # 2) Upload (this step is authoritative — fails the job on real errors)
          lftp <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 25
          set net:persist-retries 2
          open sftp://$HOST:$PORT
          user "$USER" "$PASS"
          mirror -R --no-perms --verbose --parallel=3 ./dist/ "$DIR"
          mirror -R --no-perms --verbose --parallel=3 ./dist_crm/ "$CRM_DIR"
          bye
          EOF
          # 3) Read the file back off the server to prove what origin now serves
          lftp <<EOF || true
          set sftp:auto-confirm yes
          open sftp://$HOST:$PORT
          user "$USER" "$PASS"
          get "$DIR/assets/js/pages/ingredients.js" -o /tmp/live_ingredients.js
          get "$DIR/index.html" -o /tmp/live_index.html
          get "$CRM_DIR/index.html" -o /tmp/live_crm_index.html
          bye
          EOF
          echo "=== ORIGIN VERIFICATION ==="
          if grep -q "imported from the" /tmp/live_ingredients.js 2>/dev/null; then
            echo "ORIGIN ingredients.js = NEW (macro build present)"
          else
            echo "ORIGIN ingredients.js = OLD (macro build NOT present)"
          fi
          echo -n "ORIGIN index.html asset version: "; grep -o 'ingredients.js?v=[0-9]*' /tmp/live_index.html | head -1 || echo "(none)"
          echo -n "live ingredients.js bytes: "; wc -c < /tmp/live_ingredients.js 2>/dev/null || echo "?"
          if grep -q "MBL — CRM" /tmp/live_crm_index.html 2>/dev/null; then
            echo "ORIGIN mbl_crm/index.html = PRESENT (CRM deployed)"
          else
            echo "ORIGIN mbl_crm/index.html = MISSING"
          fi

      - name: Probe LIVE fbws.tw (identify the real origin / CDN)
        run: |
          echo "=== DNS: where does fbws.tw resolve? ==="
          getent hosts fbws.tw || true
          getent hosts www.fbws.tw || true
          echo
          echo "=== LIVE response headers: brand-new marker file ==="
          curl -sS -o /dev/null -D - "https://fbws.tw/mbl_catering/assets/DEPLOY_CHECK.txt?cb=$RANDOM$RANDOM" || true
          echo
          echo "=== LIVE index.html asset version (mbl_catering) ==="
          curl -sS "https://fbws.tw/mbl_catering/index.html?cb=$RANDOM$RANDOM" | grep -o 'ingredients.js?v=[0-9]*' | head -1 || echo "(none / not found)"
          echo
          echo "=== LIVE CRM app (mbl_crm) — HTTP status + title ==="
          curl -sS -o /dev/null -w "https://fbws.tw/mbl_crm/ -> http %{http_code}\n" "https://fbws.tw/mbl_crm/?cb=$RANDOM$RANDOM" || true
          curl -sS "https://fbws.tw/mbl_crm/?cb=$RANDOM$RANDOM" | grep -o '<title>[^<]*</title>' | head -1 || echo "(no title / not found)"
          echo
          echo "=== LIVE response headers: site root '/' (Server + CDN hints) ==="
          curl -sS -o /dev/null -D - "https://fbws.tw/?cb=$RANDOM$RANDOM" || true

      - name: Note if unconfigured
        if: ${{ env.FTP_SERVER == '' }}
        run: echo "FTP secrets not set yet — skipping deploy. Add FTP_SERVER / FTP_USERNAME / FTP_PASSWORD (+ FTP_SERVER_DIR) in repo Settings → Secrets."
